body:
  text: 東家雜記卷下宋孔傳編先聖廟廟在曲阜縣西一里西接魯城二百餘步即先聖舊宅魯恭王聞金石絲竹之地也纍朝東封告成行幸儒廟皆駐蹕于此手植檜先聖手植檜三株兩株雙立御贊殿前各高六丈餘圍一丈四尺其一在杏壇之東南高五丈餘圍一丈三尺晉永嘉三年枯死至隋義寧元年復生唐乾封二年又枯至本朝康定年一枝復生杏壇先聖殿前有壇一所即先聖教授堂之遺址也昔漢鍾離意為魯相出私錢萬三千文付戶曹孔欣修夫子車身入廟拭几席劒履男子張伯除堂下草土中得玉璧七枚伯懷其一以六枚白意意令主簿安置几前孔子教授堂下牀首有懸甕意召欣問答云夫子甕也背有丹書人莫敢發意曰夫子所以遺甕欲以垂示後人因發之得素書文曰後世修吾書董仲舒護吾車拭吾履發吾笥會稽鍾離意璧有七張伯懷其一意即召問伯果服焉後漢顯宗東巡幸孔子宅亦嘗親御于此命皇太子諸王說經於堂上後世因以為殿本朝乾興間傳大父中憲監修祖廟因增廣殿庭移大殿於後講堂舊基不欲毁拆即以瓴甓為壇環植以杏魯人因名曰杏壇後殿鄆國夫人亓官氏殿昔為先聖燕居之堂魯人相傳云孔子將亡遺祕書曰後世一男子自稱秦始皇上我堂踞我牀顛倒我衣裳至沙丘而亡始皇至魯觀孔子宅至沙丘而崩又按世家孔子卒諸儒講禮鄉飲酒大射於孔子家其所居堂後代因立為廟藏孔子衣冠琴瑟車書至漢二百餘年不絶昔太史公嘗適魯觀孔子廟堂車服禮樂諸生習禮其家以至低回留之不能去云漢景帝時魯恭王好治宫室壞孔子舊宅以廣其宫聞金石絲竹之聲乃不敢壞於其壁中得古文經傳此其地也先聖小影家譜云先聖長九尺六寸腰大十圍凡四十九表反首窪面月角日準手握天文足履度字或作王字坐如龍蹲立如鳳跱望之如仆就之如升耳垂珠庭龜脊龍形虎掌駢脅參膺河目海口山臍林背翼臂㪷唇注頭隆鼻阜脥提眉地足谷竅雷聲澤腹昌顔均頥輔喉駢齒眉有一十二采目有六十四理其頭似堯其顙似舜其項類皋陶其肩類子産自腰以下不及禹三寸胸有文曰制作定世符運今家廟所藏畫像衣燕居服顔子從行者世謂之小影於聖像為最真近世所傳乃以先聖執玉麈據曲几而坐或侍以十哲而有持棕蓋捧玉磬者或列以七十二子而有操弓矢披卷軸者又有乘車十哲從行圖皆後人追寫殆非先聖之真像闕里廟學教授尹復臻嘗作小影贊云夫子之像其初孰傳得於其家幾二千年仰聖人之容色瞻古人之衣冠信所謂溫而厲威而不猛恭而安若夫其道如神其德如天則自生民以來未有如夫子蓋無得而名言世之所傳非小影畫像皆為贋本唐劉禹錫作許州新廟碑謂堯頭禹身華冠象佩之容取之自鄒魯即今之所傳小影是也廟柏先聖廟庭舊有柏二十四株厯漢晉其大合抱有二株先倒折魯人莫敢犯宋文帝時江夏王義恭出鎮彭城悉遣伐之父老為之嘆息及義恭被害剖析支體挑取目睛以密漬之為鬼目粽時人以為伐木之報也迄今廟庭松檜多而柏少廟中古碑後漢碑三元嘉二年修孔子廟置百石卒史掌領禮器碑隸書永壽二年魯相顔敕乞復顔氏亓官氏繇碑有碑陰並隸建寧二年魯相孔晨奏出本家穀祀孔子有碑隂並隸魏碑三黃初二年制命孔子二十一世孫羡為崇聖侯奉家祀碑碑乃陳思王曹植詞梁鵠書鍾繇鐫字故世謂之三絶鍾繇鐫字皆妙於篆籕故繇方得鐫後魏正光三年兖州百姓為太守張猛龍立清德頌碑東魏興和二年兖州刺史李仲􅓨修孔子廟碑諸士人為立齊碑一乾明元年夫子碑隸書磨滅字不可讀隋碑二大業七年曲阜縣令陳叔毅修夫子廟記隸書仲孝俊文九年太學博士河間劉炫撰并書唐碑十四乾封元年贈太師魯元聖孔宣尼碑崔行功文孫師範隸武德詔乾封詔儀鳳二年祭文并隸於碑陰開元七年孔子廟碑李雍文張庭圭隸開元二十八年曲阜縣令張之宏為文宣立自撰郝雍書咸通十年孔子三十九世孫魯國公溫裕乞出私俸修廟記賈防文貞元十四年任要謁夫子廟詩長慶三年崔濤謁先師言天寶元年兖公頌張之宏撰包文該書景福二年滅黃巢紀功碑太和五年李虞題名太和七年兖州刺史李文悅謁夫子文長慶元年任畹訪古於齊魯謁先師題名會昌元年兖州刺史李玭題名會昌六年兖州刺史高承恭題名咸通十年兖海節度使曹翔題曲阜宣聖廟記本朝御製書真宗皇帝先聖御贊并從官分撰七十二賢贊大中祥符二年賜太宗皇帝御書并監書器物敕廟外古跡魯城周回九里三十步城之西南隅即孔子之舊宅昔魯人泛海而失津至於澶州遇仲尼七十子遊海上指以歸塗使告魯公築城以備寇魯人歸且以告魯侯魯侯以為誕俄而羣鵲數萬銜土培城魯侯始信乃城曲阜訖而齊寇果至此其所以為聖也事載十六國春秋其說神異雖先聖之所不語然魯人尚能言之所謂疑則傳疑者于是亦綴而不遺廟東南二里魯城高門之外曰兩觀周回各四十步高一丈一尺東西相去一百步昔先聖為魯司寇攝行相事於是朝政七日而誅亂政大夫少正卯戮之於兩觀之下者是也廟東三十里有山曰防山周回八里孔子三嵗而叔梁紇卒乃葬於防山孔子母死殯于五父之衢郰人挽父之母告孔子父墓然後往合葬於防焉廟東南四十里有山曰尼丘山周回一十里即叔梁大夫與顔氏禱於尼丘而先聖生生而首上墟頂如尼丘山頂之墟本朝封山神為育聖侯今山西有先聖廟貌并育聖侯廟在焉皇祐二年封育聖侯敕敕𤣥聖肇興誕自東魯雖天之生德蓋云默定嶽之降神實應精禱兖州泗水縣尼丘山崇岡秀阜雲雨所出儲丕祐于裔後孕全氣于孔族挺育睿哲為萬代師當崇五等之封俾均四瀆之秩列于祀典以永神休攸司奉書往申昭告宜特封育聖侯仍令本州差官往彼祭告破係省錢增置祠廟即不得科率差擾及仰造本廟碑額安掛春秋差官致祭真廟東封王欽若言祭文宣王尼丘山上有紫雲氣長八九丈詔遣入內殿頭楊懷玉祭謝廟東南五十里有山曰顔母山周回一十里高三里乃叔梁大夫與顔母禱于尼丘嘗遊此山而生先聖後魏地形志亦言魯縣有顔母祠堂迄今尚在廟東南五里曰五父衢昔先聖母殯于五父之衢者即此地也廟東五里曰先聖學堂泗水纒其北洙水由其南皇覽云諸弟子房舍井瓮猶存周敬王三十六年孔子自衛反魯於此刪詩序書定禮樂繫周易至周敬王三十八年魯人西狩獲麟而作春秋因曾參孝行以縹筆而作孝經二經既成孔子於此堂下齊戒面北斗而拜告備于天紫微于是降光于此堂魯記所載孔子講堂者是也昔漢光武東巡過魯坐孔子講堂顧指子路室謂左右曰此吾太僕之室也今學已廢遺址存焉廟西南一百二十步有圃曰矍相周回二里高一丈昔孔子射於矍相之圃觀者如堵焉晉太康志亦曰矍相在魯城內縣西南近孔子宅是也今圃中猶存舊井皆陶瓦為之廟東有廢井圍五丈二尺深八十尺以石為之昔季桓子穿井得缶中若羊問先聖云得狗先聖曰以丘所聞羊也木之怪䕫罔魎水之怪龍罔象土之怪羵羊也廟西南二百步魯城有門曰歸德世傳四方諸侯慕先聖之德而至多入此門故魯人因以名之廟東南二里魯城有門曰高門昔齊人選女樂衣文衣而舞康樂文馬三十駟遺魯君陳於高門外季桓子微服往觀孔子因其三日不聽政郊不致膰俎於大夫遂行適衛廟東南二里魯城有門曰端門孔子將殁謂子貢曰端門當有血書子貢往候之果有血書云趨作法孔聖殁周姬亡彗東出秦人滅胡亥術書既散孔不滅子貢以告孔子趨而觀之化為赤烏飛去廟南十里魯縣有二石闕曰闕里蓋里門也後漢董憲禆將屯兵於魯侵害百姓明帝乃拜鮑永為魯郡太守永到大破之惟别帥彭豐等不肯下頃之孔子闕里無故荆棘自除從講堂至於里門永異之謂府丞及魯令曰方今危急而闕里自開豈夫子欲令太守行禮助吾誅無道也乃會人衆修鄉射之禮請豐等共觀視欲因此擒之豐等亦欲圖永乃持牛酒勞饗而潜伏兵器永覺手格殺豐齊國公墓孔子生二嵗而叔梁大夫卒葬於防孔子之母既喪殯於五父之衢將立葬焉郰人挽父之母誨孔子父墓孔子曰古者不祔葬為不忍先死者之復日也詩云死則同穴自周公以來祔葬矣故衛人之祔也離之有以聞焉魯人之祔也合之善夫吾從魯遂合葬於防曰吾聞之古墓而不墳今某也東西南北之人不可以弗識也吾見封之若堂者矣又見若坊者矣又見覆夏屋者矣又見若斧形者矣吾從斧者焉於是封之崇四尺祖林古跡先聖墓孔子殁公西赤為之識及掌其殯葬焉唅以疏米三貝襲衣一十有一稱加朝服一冠章甫之冠珮象環徑五寸而綦組綬桐棺四寸柏棺五寸葬魯城北泗水上藏入地不及泉而封為偃斧之形高四尺樹松柏為志焉既葬有自燕來觀者舍於子夏氏子貢謂之曰吾亦人之葬聖人非聖人之葬人子奚觀焉昔夫子言曰吾見封若夏屋者見若斧者從若斧者焉馬鬛封之謂也今徒一日三斬板而已封尚行夫子之志而已何觀乎哉皇覽亦曰孔子冢去古城北一里冢塋百畝南北廣十步東西三十步高一丈二尺如鳥卵馬鬛今周圍增廣五十餘步高一丈五尺昔孔子修春秋製孝經既成齊戒面北斗而拜告備於天乃有赤虹自上而下化為黃玉有刻文孔子跪而讀之其辭曰孔提命作應法孔子卒以所受黃玉葬焉弟子魯人往從冡而家者百有餘室魯世世相傳以嵗時奉祀先聖冢二代三代墓二代伯魚墓在先聖墓之東十步三代子思墓在先聖墓之南十步商人尚右故也真宗皇帝幸孔林顧問二冢子孫對以伯魚子思墓上太息躊蹰而退祠壇先聖殁弟子於冢前以瓴甓為祠壇方六尺至後漢永嘉元年魯相韓叔節始易之以石今壇石四面皆厯代題名嵗久漫滅字不可識駐蹕亭真宗皇帝東封回駕幸闕里顧問先聖冢墳何在子孫引導鑾輿躬至孔林奠謁畢坐墳北亭上宣兩地及兩制賜茶亭有石碑字多殘缺上命詞臣拂蘚辨認盤桓久之輦路真宗駕幸聖林以林木擁道降輿乘馬至宣聖墳設奠再拜今自林前直趨駐蹕亭有輦路皆甃以方石楷木廣志云夫子沒弟子各持其鄉土所宜木人植一本於墓而去冡上特多楷木楷本出南海今林中楷木最盛間有因風摧折者人或得之以為手板虛墓白兔溝附先聖墳西有虛墓五間皆石為之世傳先聖殁戒門弟子為虛墓後果遭秦皇發冡有白出於墓中始皇逐之至曲阜西北十八里溝而殁魯人因名其溝曰白溝林先聖葬曲阜城北泗水為之却流塋中不生荆棘刺人草木以百數皆逺方徒弟所植鄉土異種魯人世世無能名者惟楷木為多其餘則皇覽所載枌柞雒離毚檀之木迄今尚盛真廟東封王欽若言祭文宣王詣墳設奠得芝五本詔遣入內殿頭楊懷玉祭謝復得芝草四本有唐以來騷人墨客謁林者必一一賦詩而退獨一絶云靈光殿古生秋草曲阜城荒噪晚鴉惟有孔林殘照裏至今猶屬仲尼家最為絶唱傳仲父二卿嘗刻於石且題跋其後曰宗翰自為童稚巳聞人誦此詩或云一詩僧留題竟不知誰氏之作林中古碑斷碑一字碑碑石中斷字畫漫滅不可讀在伯魚墓前漢碑九永壽三年敕修夫子墓碑永興二年故婺州從事孔闕德碑在孔子祠墓壇前立延平六年立御史孔翊碑在冢前孔子十九代孫州舉孝廉拜御史遷中牟樂陽令建寧四年漢尚書侍郎博陵太守下邳縣河東太守孔宏碑博士孔君碑諱志孔乘碑字敬山修嚴氏春秋永興二年孔謙碑都尉君元子建寧二年孔子十九世孫震字上元碑終博陵太守下邳相延熹七年孔子九代孫宙字委將舉孝廉除郎中博昌長孔子十九世孫扶字仲淵碑宅圖直外門曰前三門仁宗皇帝御書門榜之門三門之後曰御書樓蓋藏賜書之樓書樓後御路東西之亭其東曰本朝修廟碑亭其西曰唐封孔子太師碑亭次殿庭門殿庭門內曰御贊殿乾興中兖州奏乞於夫子之後選朝官一人專切監修本廟是時祖父中憲被選奏修是殿次後曰杏壇杏壇之後即先聖正殿仁宗皇帝御書飛白殿榜之殿直殿後曰鄆國夫人殿後殿東廡曰泗水侯殿西廡曰沂水侯祖殿廊西門外曰齊國公殿直殿後曰魯國太夫人殿魯國太夫人舊與齊國同殿慶歷八年四十五代孫彥輔宰鄉邑奉聖㫖監修祖廟始乞移於後殿自太夫人殿由東廊以北曰五賢堂祖殿廊東門外曰齊㕔齊㕔之東廊門外曰客位直齊㕔後曰齊堂齊堂後曰宅㕔直宅㕔後曰家廟自客位東一門直北曰襲封視事㕔直㕔後曰恩慶堂中丞公典鄉郡日侍致政尚書會孔氏親族於此堂徂徠石守道先生有碑記其事堂之東北隅曰雙桂堂皇祐年先公仲父同年賜第舊嘗于此會學故以名之諸位皆列於祖殿之後恩慶堂東西自祖廟并諸位舊係敕修近世監修祖廟者窘於用度不敢以官錢營飾私居遂罷修諸位今族間居處皆自備修葺餘諸位外祖廟殿庭廊屋共三百一十六間南渡家廟家廟自六飛南渡㫖令暫以衢學揭䖍寶祐二年江東憲使常卿友山孫先生念斯文所係不可缺典申請於朝擇城東菱塘勝槩徹浮屠舍而鼎建先聖宫牆煥然一新大資庸齊大先生發椽筆紀顛末而鋟之樂石記云夫子與太極合德故其祀遍于天下此非其子孫所得而私也然遍廟郡國缺廟于家此其子孫之責亦郡刺史之任有天下者尤當惓惓也蓋神莫萃於廟廟於郡國所以尊夫子於天下尊之者以道之所在也廟於家所以親夫子於家庭親之者以氣之所自也蓋夫子魯人也殁於闕里門人以其所居堂而廟焉藏其衣冠琴書至漢高祖光武明帝皆親至而祠焉當是時郡國猶未有廟至唐開元始正夫子南面之位門人為配於是郡國遍有廟然曲阜家廟自若也國朝真皇帝鑾輅至魯謁祠登冢封夫子之父於齊母顔氏於魯妻亓官氏於鄆魯廟於是益光輝矣厥後又侯其子鯉孫伋於沂泗褒崇之典畢備髙皇帝駐蹕吳㑹其裔孫五人𫝊端友端木瓚琯扈六飛南渡寓三衢因家焉朝命權以家廟寓學宫春秋舍奠襲封奉祠者率族拜跪踧踖獻不與焉退修魚菽之祭喧囂湫隘甚非所以崇素王也蓋百有三十年於兹料院孫侯子秀至曰其子孫之責與郡刺史之任毅然請於朝玉音賜俞奉常定制得地於城之東北陬浮屠氏廢廬撤而宫之枕平湖以象洙泗面龜峰以想東山對廟門而中為𤣥聖殿西則齊魯後則鄆國祠沂泗二侯於廡之東西又别為室以祠襲封之得祠者後為堂曰思魯俾之合族講學且以志不忘闕里之舊也堂之東亭曰詠春以憩四方之士仰止高山低回而不能去者為屋二百二十有五楹經始於寶祐癸丑仲夏落成於次年仲春朔董其役者其裔孫元龍等郡都曹錢紳汝騰竊惟夫子之聖於昭於天奚假於廟然洋乎其上如在左右非廟莫著仲丁牲牢雖遍方國家庭之際蒸祫無所為聖者子孫得不怛然乎前此因循冀魯疆之復曲阜之廟可修嵗月滋久遂成缺典此亦有天下國家褒崇𤣥聖者之責今天子聖明慨然從請即其子孫所屬之區倣曲阜之制追魯廟之遺棟宇巍然丹碧一新豈獨使承祭者祼獻盡禮視瞻如在暨今過者如式宫牆入者如升絲竹之堂息者如風乎舞雩水光漣漪上接天碧林薄蔽虧逺映城市魚鳥飛躍道體森然春沂杏壇氣象可想不亦偉乎汝騰嘗謂夫子多賢子孫百聖所不能及鯉知詩禮伋著中庸猶曰逮事夫子也若白若穿若武若襄若鮒若僖若融若戣若道輔大儒則若安國若頴達何其彬彬然盛也此固夫子儀刑之不墜亦道德之感應然也今兹廟成名孫亹亹其將必有達者出焉舍菜之日侯講夫子上律天時一章詞㫖粹明唘迪來者多矣方將請於上錫雲章以揭廟顔與斯道斯廟相為不朽亟走介書請汝騰記本末汝騰智不足以知聖人於是祠嘉其有補於世教之大不敢不執筆侯有文學政事以常丞召見家長奉嶽祠璋見襲封通守洙皆得附書寶祐二年二月甲子日汝騰謹記右東家雜記孔子四十七代孫朝議公紹興間所編其後五十三世孫倅上饒今年春同釋奠於廟學竣事出示則舊板多漫漶乃取而重刻之庶自孔氏者皆與知焉昔司馬遷列孔子世家漢平帝追諡曰宣尼公遷史自有微意不必論若元始以後所以尊孔子者非古矣孔門之訓字為最貴春秋之作字而不名者僅十有二人門人於孔子進而稱子不敢氏退而稱仲尼不言子孝經與禮運皆曰仲尼至子思字其祖孟子字其師之祖而孟子亞聖不得以字行相承至漢初未有輕以字許人者新莽不知仲尼之稱尊無以尚妄諡以宣然尼之字猶未敢去也及代崇褒典則以纍諡為重王封為貴矣靖康之禍有欲發先聖墓者其渠帥問孔子何人或對曰古之大聖人彼曰大聖人墓豈可發故闕里得全嗚呼此可以觀世變亦見天理在人心無時而或息也因並識之咸淳元年三月朔朝請郎知信州軍州兼管內勸農營田事莭制軍馬新除祕書丞馮夢得謹跋東家雜記卷下
