body:
  text: 東家雜記傳記類一聖賢之屬提要臣等謹按東家雜記二卷宋孔傳撰傳字世文至聖四十七代孫建炎初隨孔端友南渡遂流寓衢州紹興中官至右朝議大夫知撫州軍州事兼管內勸農使封仙源縣開國男是編成於紹興甲辰上卷分九類曰姓譜曰先聖誕辰諱日曰母顔氏曰娶亓官氏曰追封諡號曰厯代崇封曰嗣襲封爵沿改曰改衍聖公曰鄉官下卷分十二類曰先聖廟曰手植檜曰杏壇曰後殿曰先聖小影曰廟柏曰廟中古碑曰本朝御製碑曰廟外古迹曰齊國公墓曰祖林古迹曰林中古碑其時去古未逺舊迹多存傳又生長仙源事皆目睹故所記特為簡核前有孔子生年月日考異一篇末題淳祐十一年辛亥秋九月戊午朔去疾謹書未有南渡廟記一篇題寶祐二年二月甲子汝騰謹記二人宋宗室子故皆不署姓去疾稱舊有尹梅津跋此本無之而復有淳熙元年葉夢得跋蓋三萹皆重刻所續入也去疾考中厯駁諸家之誤而以為春秋用夏正定孔子生於十月二十一日卒於四月十八日其説殊謬殆由是時理宗崇重道學胡安國傳方盛行故去疾據以為説歟錢曾讀書敏求記曰壬戌冬日葉九來過方草堂云有宋槧本東家雜記因假借繕寫此書為先聖四十七代孫孔傳所編首列杏壇圖説記夫子車從出國東門因觀杏壇厯級而上顧弟子曰兹魯將臧文仲誓將之壇也覩物思人命琴而歌其歌曰寒暑往來春復秋夕陽西去水東流將軍戰馬今何在野草間花滿地愁考諸家琴史俱失載附録於此詳其語意未知果為夫子之歌否也云云按此歌偽妄不辨而明曽乃語若存疑蓋其平生過尊宋本之失然曾云三卷此本實二卷曾云首列杏壇圖説此本杏壇為下卷第三篇且有説無圖亦無此歌不知曾所見者又何本也其或誤記歟乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀東家雜記原序先聖沒逮今一千五百餘年傳世五十或問其姓則內求而不得或審其家則舌舉而不下為之後者得無愧乎傳竊嘗推原譜牒參考載籍則知鄭有孔張出於子孔衛有孔達出於姬姓蓋本非子氏之後而徙居於魯者皆非吾族若乃厯代褒崇之典纍朝班賚之恩寵數便蕃固可以枚陳而列數以至驗祖壁之遺書訪闕里之陳迹荒墟廢址淪沒於春蕪秋草之中者闕有之故老世傳之將使聞見之所未嘗者如接於耳目之近於是纂其軼事綴所舊聞題曰東家雜記好古君子得以覽觀焉時巨宋紹興甲寅三月辛亥四十七代孫右朝議大夫知撫州軍州事兼管內勸農使仙源縣開國男食邑三伯户借紫孔傳序孔子生年月日考異春秋公羊傳魯襄公二十有一年冬十有一月庚子孔子生按皇極經世書已酉嵗周靈王二十年魯襄公二十有一年也傳之注曰時嵗在已卯誤也按春秋書冬十月庚辰朔日有食之則庚子在十月二十一日而十一月無庚子傳亦誤也春秋穀梁傳魯襄公二十有一年冬十月庚辰朔庚子孔子生按傳以為十月是也春秋左氏傳魯哀公十六年夏四月已丑孔丘卒按皇極經世書壬戌嵗魯孔子卒周敬王四十一年魯哀公十有六年也傳之注曰孔子魯襄公二十二年生今年七十三也則是以為庚戌嵗周靈王二十有一年魯襄公二十有二年而孔子生也與公穀二傳不合傳之注又曰四月十八日乙丑無已丑已丑五月十二日日月必有誤史記世家魯襄公二十二年而孔子生孔子年七十三以魯哀公十六年四月已丑卒按史記書孔子生年及書年七十三則左氏傳之注所據也其書孔子卒年及書卒曰已丑之誤則史記因左氏所書而未之考也史記索隱索隱曰春秋公羊傳襄公二十一年十一月庚子孔子生史記以為二十二年蓋以周正十一月屬明年故誤也若孔子以魯襄公二十一年生至哀公十六年為七十三若襄公二十二年生則孔子年七十二經傳生年不定使孔子壽數不明按索隱之説謂公羊以周正十一月屬明年為庚戌嵗首故誤以為十一月此為得之蓋十月有庚子而十一月無庚子此公羊之誤也當以穀梁傳十月庚子為正蓋庚子在十月二十一日爾然據索隱所指魯哀公十六年嵗在壬戌上泝襄公二十一年嵗在已酉則孔子年七十四今以為七十三是少一嵗索隱又以襄公二十二年庚戌至哀公十六年壬戌為七十二亦少一嵗此則索隱之誤也闕里譜系洪興祖所著洪氏之説非公羊取穀梁譏索隱似是矣然謂自襄公二十一年十月至哀公十六年四月實七十四年春秋用周正周之十月乃夏之八月周之四月乃夏之二月此洪氏之誤也又曰孔子實七十四嵗太史公讀公羊誤以十一月為建子之月於周為明年嵗首故遂以孔子為七十三嵗此亦洪氏之誤也按春秋魯史之舊名孔子因魯史以修春秋隱公元年不書曰冬十有一月而曰春王正月者使孔子為政於天下則必行夏之時故先書春以表四時之首又書王以見時王實以建寅為正月而不以建子為正月也其書王二月者建卯之月王以為二月而不以為四月其書王三月者建辰之月王以為三月而不以為五月以見春秋但行夏時而非改正朔也然則孔子生為冬十月建亥之月孔子卒為夏四月建巳之月明矣司馬遷博極羣書而去孔子之時為近其書孔子之生卒年月必不誤也東家雜記孔子四十七代孫孔傳所述雜記曰周靈王二十一年已酉嵗即魯襄公二十二年也當襄公二十二年冬十月庚子日先聖生又曰周敬王四十一年辛酉嵗即魯哀公十六年也當哀公十六年夏四月乙丑日先聖薨先儒以為已丑者誤也按雜記所書生年月日與穀梁傳合是為冬十月二十一日庚子無疑所書薨年月日與左氏傳合是為夏四月十八日乙丑無疑然以生年為已酉嵗則是周靈王二十年魯襄公二十一年也若以為周靈王二十一年魯襄公二十二年則是庚戌嵗矣其書卒年以為周敬王四十一年魯哀公十六年則是壬戌嵗矣今以為辛酉嵗亦非也蓋生年既移庚戌嵗為已酉嵗則薨年遂亦移壬戌嵗為辛酉嵗以求合於史記世家之七十三嵗而不知生於已酉之年而已得庚戌嵗節此又雜記之誤也按公羊傳以先聖生日為冬十有一月則是年十一月無庚子左氏傳以先聖薨日為已丑則是年四月無已丑史記以先聖之年為七十三則自已酉嵗至壬戌嵗為七十四此今昔之所疑也今考春秋長厯周靈王二十年已酉嵗八月置閏以厯法積之則大雪節當在十月十七日或十八日是為十一月朔氣又三四日方為庚子日是先聖之生已在建子之十一月節氣矣既入十一月節氣則是襄公二十二年庚戌嵗首無疑公羊傳之書十一月若誤也而實不誤也史記以為襄公二十二年而又以孔子為年七十有三亦未嘗誤也穀梁氏於年於月皆據實書公羊氏於年據實書而於月以節書謂有日可表也司馬氏之筆則於年即以節書三者皆非誤矣先聖薨日則左氏之誤無疑亦以春秋長厯考之是年夏四月戊申朔有乙丑無已丑無可疑者右因見江西轉運司新刻東家雜記尹梅津為之跋謂今四月八日浮屠氏盛為香花供問之則曰佛生日也吾徒衣逢掖之衣者深衣大帶者問以孔聖生之日則􅌓眙左右顧莫知所以為對非闕歟去疾讀之猶有疑焉此孔氏家傳不應有誤者因為之考訂如上蓋其冬夏之月庚子乙丑之日不誤也特以一戌為二酉則嵗名之誤爾按雜記既以左傳卒日已丑為先儒之誤而定以乙丑為是則魯哀公十五年辛酉嵗四月甲申朔亦無乙丑則又以見是壬戌嵗無疑矣薨年壬戌則生年庚戌於經於史皆合而又何疑乎輒書以寄臨汝書堂使每嵗用十月二十一日及四月十八日行食必打素居喪不飲酒食肉忌日喪之餘也若生日則念親之深故亦不飲酒食肉也王通氏曰吾於夫子受罔極之恩當以父母之禮行之辛亥淳祐十一年秋九月戊午朔去疾謹書
