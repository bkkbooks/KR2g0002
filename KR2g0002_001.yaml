body:
  text: 東家雜記巻上宋孔傳編姓譜昔契以佐禹治水有功封於商而賜姓子氏至周成王時以商之帝乙長子㣲子啓國於宋啓卒立其弟㣲仲衍㣲仲衍生宋公稽宋公稽生丁公申丁公申生湣公共及襄公熙熙生弗父何弗父何生宋父周宋父周生世子勝世子勝生正考父正考父生孔嘉父孔嘉父者其字也而先儒以謂當時所賜號者誤矣孔嘉父生木金父木金父生祁父五世親盡列為公族祁父因以王父字為孔氏而其子孔防叔避宋華督之難奔魯為大夫因家於魯孔防叔生伯夏伯夏生叔梁紇長子曰孟皮有疾不任繼嗣次子則先聖是也自孔子没子孫世為魯人同居祖廟先公文清先生昔嘗推原世譜以謂本姓出於子姓者是姬姓者非如鄭有孔張出於子孔衛有孔達孔悝出於姬姓實在子姓之先皆非孔子之後先聖誕辰諱日周靈王二十一年已酉嵗即魯襄公二十二年也當襄公二十二年冬十月庚子日先聖生是夕有二龍繞室五老降庭五老者五星之精也又顔氏之房聞奏鈞天之樂空中有聲云天感生聖子故降以和樂笙鏞之音周敬王四十一年辛酉嵗即魯哀公十六年也當哀公十六年夏四月乙丑日先聖薨先儒以為已丑者誤矣方先聖未生時有麟吐玉書於闕里其文曰水精之子係衰周而素王顔氏異之以繡紱繫麟角信宿而麟去至哀公十四年西狩大野叔孫氏車子鉏商獲獸以為不祥先聖視之曰麟也胡為來哉胡為來哉反袂拭面泣涕沾襟叔孫聞之然後取之而繫角之紱尚存麟見而天告夫子將亡之證也夫子晨蚤作負手曳杖逍遥于門而歌曰泰山頹乎梁木壞乎哲人萎乎因以涕下既歌而入當户而坐子貢聞之曰泰山其頹則吾將安仰梁木其壞則吾將安放夫子殆將病也遂趨而入夫子嘆曰賜汝何來遲夫明王之不興則天下其孰能宗予夏人殯于東堦周人於西堦商人於兩楹間昨暮予夢坐奠於兩楹之間予殆商人也後七日而終時年七十三母顔氏叔梁紇雖有九女而無子其妾生孟皮一字伯尼有足疾於是乃求於顔氏顔氏有三女其小曰徵在顔父問三女陬大夫雖祖父為士然其先聖王之裔今其人身長十尺武力絶倫吾甚貪之雖年高性嚴不足為疑三子孰能為之妻二子莫對徵在進曰從父所制將何問焉父曰即爾能矣遂以妻之娶亓官氏孔子十九娶于宋之亓官氏孔子追封諡號漢平帝元始元年追諡夫子為褒成宣尼公魏文帝太和十六年改諡文宣尼父後周宣帝大象二年追封鄒國公詔曰盛德之後是稱不絶功施於民義昭典祀孔子德惟藏往道實生知以大聖之才屬千古之運載𢎞儒業式叙彛倫至如幽賛天人之理裁成禮樂之務故以作範百王垂風萬葉朕欽承寶厯服膺敎義眷言洙泗懷道滋深而襃成啟號雖彰故實旌崇聖績猶有闕如可追封為鄒國公唐太宗貞觀十一年詔尊孔子為宣父唐高宗乾封元年封襌還塗經曲阜親幸祠廟追贈先聖為太師制曰魯大司寇資大聖之才屬衰周之末想乗桴而永嘆因獲麟而興感垂素王之雅則正史策之繁文播洪業於當時昭景化於千祀朕嗣膺寳厯祇奉睿圖憲章前王規矩先聖功成化洽禮盛樂和展采東巡迴輿西上途經此境撫事興懷駐此荒墟願為師友瞻望幽墓思承格言雖燕寢荒蕪餘址僅在靈廟虚寂徽烈猶存孟軻曰自生民以來未有如孔子者也㣲禹之嘆既深褒成之禮宜峻可贈太師庶年代雖逺式範令圖景命惟新儀形茂實唐則天天授元年十月封隆道公唐明皇開元二十七年八月二十三日封文宣王制曰𢎞我王化在乎儒術能發揮此道啟迪含靈則生民以來未有若孔子者也故能立天地之大本成天地之大經美政化移風俗君君臣臣父父子子民到于今受其賜不其偉歟於戲楚王莫封魯公不用俾夫大聖才列陪臣栖遲旅人固可知矣年祀濅逺光靈益彰雖代有褒稱未為崇峻不副於實人其謂何夫子既稱先聖可追諡為文宣王本朝眞宗皇帝大中祥符元年加夫子號為𤣥聖文宣王春秋孔演圖曰孔子母感黒帝而生莊子亦云𤣥聖素王故有是號勅中書門下王者順考古道懋建大猷崇四術以化民昭宣敎本總百王而致治丕變人文方啟迪於素風思丕揚於鴻烈先聖文宣王道膺上聖體自生知以天縱之多能實人倫之先覺立功侔乎簡易景鑠配乎貞明惟列辟以尊崇為億載之師表肆朕寡昧欽承命厯曷嘗不遵守彞訓保乂中區屬以祇若元符告成喬嶽觀風廣魯之地飭駕數仞之牆躬謁遺祠緬懷遐躅仰明靈之如在肅奠獻以惟寅是用證簡冊之文昭聰叡之德聿舉追榮之禮庶申嚴奉之心備物典章垂之不朽誕告多士昭示朕意宜追諡曰𤣥聖文宣王先是詔有司檢討漢武帝唐高宗明皇褒宣聖故事且命輔臣議定初欲追諡為帝或言宣父周之陪臣周止稱王不當加以帝號故第增美名續奉勅改諡至聖文宣王厯代崇奉魯哀公十七年立廟於舊宅守陵廟百户漢高祖滅項羽平天下十二年十二月行自淮南還過魯以太牢祀先聖封九代孫縢為奉嗣君前漢元帝初元中下詔太師褒成君霸以所食邑八百戸祀孔子後漢光武建武五年破董憲車駕還幸魯使大司空祀孔子後漢明帝永平十五年東巡狩還過魯幸闕里以太牢祀先聖及七十二弟子作六代樂親御講堂命皇太子諸王説經帝時升廟立羣臣中庭北面皆再拜帝進爵而後坐大會孔氏男子二十以上者六十有三人命儒臣講書十九代孫蘭臺令僖因自陳謝帝曰今日之會寧於卿宗有光乎僖對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乗辱臨弊里此乃崇禮先師增輝聖德至於光榮非所敢承帝大悦曰非聖者子孫焉有斯言遂拜僖郎中賜褒成侯并賜孔氏男女錢帛詔僖從還京師令校讎東觀後漢章帝元和二年東巡狩進幸魯祀孔子於闕里及七十二弟子賜褒成侯及諸孔男女帛後漢孝安延光五年幸泰山祀孔子及七十二弟子於闕里孔氏親屬及婦女悉會賜襃成侯帛各有差後漢靈帝建寧中給守廟百户晉武帝泰始三年詔魯國四時備三牲以祀孔子太寧三年詔給奉聖亭侯孔亭四時祀孔子祭宜如泰始故事魏文帝黄初二年詔曰昔仲尼資大聖之才懷帝王之器當衰周之末無受命之運乃退考五代之禮修素王之事因魯史而制春秋就太師而正雅頌俾千載之後莫不宗其文以述作仰其聖以成謀兹可謂命世之大聖億載之師表者也今舊居之廟毁而不修襃成之後絶而莫繼闕里不聞講誦之聲四時不覩烝嘗之位豈所謂崇禮報功盛德百世必祀者哉其以二十一代議郎羨為崇聖侯邑百户奉先聖祀令魯郡修起舊廟置吏卒百户以守衞之後魏顯祖皇興二年以青徐既平遣中書令兼太常高允以太牢禮孔子太和十九年四月行幸魯城辛酉詔拜孔氏四人顔氏二人為官又詔選諸孔宗子一人封崇聖侯邑一百户以奉孔子之祀又詔兖州為孔子起園栢修飾墳壠更建碑銘襃揚聖徳後魏高祖延興二年詔曰尼父稟達性之姿體生知之量窮理盡性道光四海頃者淮徐未賓廟隔非所致令祀典寖廢禮章殄亡遂使女巫妖覡淫進非禮殺生鼓舞倡優媟狎豈所以尊明神欽聖道者自今以後有祭孔子廟制用酒脯而巳不聽婦女合雜以祈非望之福犯者以違制論其公家有事如常禮犧牲粢盛務盡豐潔臨事致敬令肅如也宋文帝元嘉十九年詔曰胄子始集學業方興自㣲言泯絶逝將千祀感事思人意有慨然奉聖之後可速議繼襲於先廟地仍速為營造依舊給祠宜合四時饗祀闕里往經寇亂黌校殘毁并下魯郡修復學舎採召生徒昔之聖哲及一介之善猶或衛其墳壠禁其芻牧況尼父德表生民功被百代而墳塋荒蕪荆棘弗翦可蠲墓側數戸以掌灑掃魯郡上民孔景等五戸居近孔子墓側蠲其課役供給灑掃并種松栢六百株南齊世祖永明七年詔曰宣尼誕敷文德峻極自天發揮七代陶鈞萬品英風獨舉素王誰匹功隠於當年道深於日月感麟厭世緬邈千祀川竭谷虚阜夷淵塞非但洙泗湮淪至乃饗嘗乏主前王欽仰崇修寢廟嵗月亟流鞠為茂草今學校興立實禀洪規撫事懷人彌増欽屬可改築宗祊務在爽塏量給祭秩禮同諸侯奉聖之爵以時紹繼北齊顯祖保定元年下魯郡以時修治廟宇務盡褒崇洪厥雅道大訓生民師範百王軌儀千載世人斯仰忠孝攸出𤣥功潛被至德彌闡雖反被遐曠而祧薦靡闕時祭舊品秩比諸侯頃嵗以來祀典零替俎豆寂寥牲奠莫舉豈所以充昭盛烈永隆風敎者哉可式循舊典詳復祭秩使牢餼備禮欽饗兼申梁敬帝太平二年詔曰夫子降靈體哲經仁緯義允光素王載闡𤣥功仰之者彌高誨之者不倦立忠立孝德被蒸民制禮作樂道冠羣后雖泰山頹峻一簣不遺而泗水餘瀾千載猶在一自國圖屯阻祀薦不修奉聖之門繼嗣殱滅敬神之寢簠簋寂寥永言聲烈寔兼欽愴外可搜舉魯國之族以為奉聖後并繕廟堂供備祀典四時薦秩一皆遵舊後周宣帝大象二年立後承襲隋煬帝大業四年詔曰先師尼父聖德在躬誕發天縱之姿憲章文武之道命世膺期藴兹素王而頹山之歎忽踰於千祀盛德之美不存於百代永惟懿範宜有禮樂可立孔子後為紹聖侯有司求其苗裔録以申上唐神堯高祖武德二年立孔子廟于國子監唐太宗貞觀十一年給先聖廟戸二十以奉饗唐高宗乾封元年封禪還京途經曲阜親幸祠廟追贈先師為太師其廟宇制度卑陋宜加修造仍令三品一人以太牢致祭其子孫並免賦稅其年十二月上遣司稼正卿扶餘隆以太牢之具致祭于先聖其祭文曰惟神玉鈎陳貺靈開四肘之源金鼐流禎慶傳三命之範神資越誕授山嶽以騰文天縱攸高藴河海而標狀折衷六藝宣創九流睿乃生知殊非外奬於是考三古襃一言刋典謨定風什莊敬之容畢備鐘皷之音載和父子爰親君臣以睦蕩乎煥乎樂正雅頌各得其所可不謂至聖矣朕以寡德嗣膺神器式崇祇配展義云亭感周禮之尚存悲素王之獨往杼軸洙泗如揖清瀾留連舞雩似聞金奏昌門曳練徒有生芻之儀漢曲移舟非復祥萍之實慨然不已爰贈太師堂宇卑陋仍令修造褒聖子孫闔門勿事庶能不遺百世助損益之可知永鑒千年同比肩而為友聿陳菲奠用旌不朽唐則天神龍元年以鄒魯百戸為隆道公采邑以奉嵗祀子孫世襲褒聖侯唐中宗神龍元年以三十四世孫崇基取鄒魯之邑百戸収其租稅用為享薦唐睿宗太極元年以兖州隆道公近祠戸三十供灑掃唐明皇開元十三年封禪廻幸孔子宅遣使以太牢祭其墓給復近墓五戸令天下州縣立廟賜百户灑掃充春秋饗奠因廣大本廟仍每代長子一人承襲兼賜一子官開元二十七年封文宣王遣三公持節冊命令譔儀注昔緣周公南面夫子西坐今位既有殊坐豈仍舊補其墜典永作常式自今以後夫子面南而坐内出王者衮冕以衣之唐憲宗元和十三年復置灑掃五十戸文宣王家予一子官唐武宗會昌五年有事於南郊文宣王後予一子出身唐宣宗大中元年有事於南郊文宣王後予一子官復封百戸充春秋祀唐懿宗咸通四年加四十代孫振實封百户灑掃陵廟五十戸唐僖宗乾符二年有事于南郊文宣王後予一子官唐禮樂志三曰陳設注其褒聖侯若在朝朝於文官三品下後周髙祖廣順二年親征慕容彦超至兖州城將破夜半夢一人狀甚魁異被王者服謂高祖曰陛下明日當得城及覺天猶未旦高祖私自喜曰夢兆如此可不務乎因躬督將士戮力攻城至午而城果陷車駕既入有司請從王方鳴鞘而進因取别巷轉數曲偶過夫子廟帝意豁然謂近侍曰寡人所夢殆夫子乎不然何取路於此因駐蹕升堂瞻禮神像一如夢中所見者高祖大喜因叩頭再拜近臣或謂天子不當拜異世陪臣高祖曰夫子聖人也百王取則而又以夢告寡人得非夫子幽贊所及耶安得不拜因幸闕里復再拜乃留所奠酒器銀爐等於廟及幸孔林又拜之墓前石壇乃唐封禪之壇也二百年間絶東封之禮洙泗之上無鸞和之音高祖以武功之餘特枉駕焉顧謂近臣訪孔子之後或對以四十三世孫前曲阜令襲封文宣公仁玉者乃召見奏對數刻面賜章服及白金雜綵等仍以廟側數十家為灑掃户及勅兖州修葺祠廟林禁樵採本朝太祖皇帝建隆間賜御製贊曰王澤下衰文武將墜尼父挺生河海標異祖述堯舜有德無位哲人其萎鳳鳥不至建隆三年詔文宣王廟宜准儀制令立㦸十六枚太宗皇帝因四十四代孫宜入覲顧問孔氏厯世之數具以實對上謂左右家世有如此者乎特遷贊善大夫襲封文宣公其誥略云朕以夫子之聖其道猶天睠彼裔孫宜其嗣襲況聞爾服勤素業砥礪官常乃諭善於東宫俾增榮於闕里勉遵家法以荷國恩太平興國三年詔免本家稅租先是厯代以聖人之後不預庸調顯德中遣使均田遂抑編戸至是特免眞宗皇帝至道三年九月詔四十五代孫許州長葛縣今延世上殿詢以家門故事授曲阜令襲封文宣公許於㕔上見長吏以公爵也面賜束帛中金器物及賜太宗御書并九經書等先是殿中丞方演言兖州西曲阜縣文宣王廟有書樓而無典籍請賜九經及先帝御書重給祭器並從之景德四年賜文宣王四十六代孫聖祐同學究出身又詔兖州舊以七戸守孔子墳宜增至二十户大中祥符元年五月勅每日破乳香一分焚燒八月準勅今年十一月有事于泰山其文宣王四十六代孫聖祐許於京官後陪位十月準勅告報皇帝封禪畢駕至兖州曲阜縣謁先聖廟其文宣公伯叔兄弟子姪並許陪位勅朕以紀號岱宗覲風廣魯載懷先聖實主斯文矧尼丘毓粹之區光靈可揖而曲阜奉嗣之地廟貌猶存將伸款謁之儀用表欽崇之禮取十月一日幸曲阜縣備禮躬謁祥符元年十月二十七日下十一月一日幸曲阜縣謁先聖廟内外設黄麾仗上服靴袍行酌獻之禮宰臣親王而下文武百官各立班於殿庭孔氏宗屬並陪位初有司定儀當肅揖上特再拜以伸崇奉之意百官皆拜帝斂袵北面式瞻睟容仍顧廟宇制度嘉歎久之立殿之西序召孔氏子孫撫諭周緻又幸叔梁大夫堂賜四十四代孫延祜延渥延魯延齡並同學究出身四十六代孫聖祐授太常寺奉禮郎以别居四十四代孫謂賜同三傳出身面奉聖㫖許造酒以供祭祀詔加諡至聖文宣王祝文特進名并修飾祠廟其廟内制度未完典禮因兹改正更給近便十戸以奉塋廟仍差官以太牢致祭宣賜孔氏銀二百兩帛三百疋錢三十萬俵賜諸房又賜田百頃又詔廟内常用祭器或壞可盡易之十一月三日勅至聖文宣王父叔梁紇更追封齊國公母顔氏追封魯國太夫人又勅伯魚母追封鄆國夫人又勅賜御製贊御書并篆額若夫檢玉岱丘迴輿闕里緬懷于先聖躬謁于嚴祠易俗化民既仰師於彛訓宗儒重道宜益峻于徽章增薦崇名聿陳明祀思形容于盛德爰刻鏤于斯文讚曰立言不朽垂敎無疆昭然令德偉哉素王人倫之表帝道之綱厥功茂實其用允臧升中既畢盛典載揚洪名有赫懿範彌彰大中祥符元年十一月一日奉勅御書院摸勒刻石加諡𤣥聖文宣王祭文維大宋大中祥符元年嵗次戊申十一月戊午朔四日辛酉崇文廣武聖明仁孝皇帝某謹遣推誠保德功臣光祿大夫行吏部尚書上柱國清河郡開國公食邑一千戸食實封八百戸張齊賢致祭于𤣥聖文宣王朕以有事岱宗畢告成之盛禮緬懷闕里欽設敎之素風躬謁奠于嚴祠特褒崇于懿號仍令舊相載達精誠昭薦告蠲用遵典禮以兖國公顔子等配尚饗追封齊國公勅勅朕祇陟岱宗親延魯甸永懷先聖之德躬造闕里之庭奠獻周旋欽崇備至惟降靈之所自亦錫羨之有初像設具存名稱斯闕宜加追命以煥典章叔梁紇可追封齊國公顔氏可追封魯國太夫人大中祥符元年十一月三日下追封鄆國夫人勅勅朕因巡魯甸躬謁孔堂顧風敎之所宗舉典章而就渥眷惟令淑作合聖靈載稽典冊之文尚闕宗崇之數屬兹咸秩特示追榮垂厥方來式昭遺懿亓官氏可追封鄆國夫人仍令兖州差官往本廟祭告大中祥符元年十月十一日下大中祥符二年遣入内内侍省殿頭張文質齎勅賜太宗皇帝御製書一百五十七巻軸并内降金渡器物等并九經三史及疏釋文及昨赴文宣王廟供養器物金渡銀香合并香藥緋羅銷金帕黄複等其所賜書仍令本州選儒生講説賜書并賜塗金器用等勅勅國家尊崇師道啟迪化源眷惟鄒魯之邦是曰詩書之國尼山在望靈宇增嚴朕以登岱告成迴鑾款謁期清風之益振舉縟禮以有加式咨誨誘之方更盡闡揚之㫖宜以所賜太宗皇帝御製御書與九經書并正義釋文及器用等並置於廟中書樓上收掌委本州長吏職官與本縣令佐等同共檢校在廟如有講説釋奠並須以時出納勿令損汚此勅文仍仰刋之于石昭示無窮大中祥符二年春賜先聖冕服等易以玉珪先是以木為之故也祥符二年二月四十五代孫殿中丞知曲阜縣原本避諱請先聖廟創立學舎從之仍許就齋㕔講説大中祥符二年五月追封孔子并弟子兖國公顔子等下詔曰朕乃者封巒禪社昭列聖之鴻勲崇徳報功廣百王之彛制洎言旋於闕里遂躬謁於魯堂瞻河海之姿睟容穆若出洙泗之上高風凛然舉茂典之有加期斯文之益振由是推恩世冑併錫其寵章祇事祠庭廣增其奉邑念性與天道德冠生民議兹𤣥聖之名冀廣嚴師之禮兼朕親製以表崇儒至于四科鉅賢並超五等七十達者俱贈列侯仍命寀寮分紀遺烈式盡褒揚之㫖庶資善誘之方宜令中書樞宻院三司兩制丞郎待制館閣直館校理分撰贊以聞又詔曲阜縣謁文宣王廟日從官並於廟内立石刻名天禧二年五月勅委本州於本城内選差兵士四十人員寮一名於本廟巡宿守把防䕶官物一年一替并委轉運司於轄下州軍有衣甲器械處約度合銷分數支與本廟天禧五年奉聖㫖下轉運司支破官錢差撥兵士工匠修葺本廟及於夫子之後選差朝官一人是時傳大父中憲方任太常博士被選監修因乞封禪行闕餘材皆豫樟楩梓之屬自是殿宇益加宏壯仁宗皇帝慶厯四年三月勅於本縣中等人户内差廟戸五十人充本廟灑埽諸般祇應嘉祐六年御飛白書殿榜并金字篆牌差入内内侍省西頭供奉官劉温良高品楊安道押賜盛以綵樓差輦官三十人并親事官工匠等共五十一人置於本廟逐州令官吏以皷吹僧道奉引上初冩牌巾櫛而書其尊師重道如此是時傳先公文清先生宰鄉邑因進詩百韻稱謝轉運使祕閣校理張師中亦進寶奎耀文歌御祭文維嘉祐六年嵗次辛丑三月甲申朔十九日壬寅皇帝某謹遣通判兖州田洵敢昭薦于至聖文宣王惟王淵聖難名誠明易稟敷厥雅道大闡斯文生民以來至德莫二敎行萬世儀比一王闕里之居祠宇惟煥遐瞻牆仞逖仰門扉舊于飛染之蹤新兹標榜之制命工庀事推策㳙辰敢議形容益伸崇奉仰惟降格遙冀鑒觀尚饗神宗皇帝元豐元年十月詔兖州常以省錢且葺宣聖祠廟先是州縣憚于申請廟久不修且壞榱棟傾落人不堪憂至是始獲完葺祠廟一新以省錢修遂為定制五年十一月賜度牒三十本給兖州修孔子廟及於本路差雜役兵士工匠等運司奏委四十七代孫沂州新太縣令若升監修七年五月詔自今春秋釋奠以鄒國公孟子配食文宣王設位於兖國公之次荀況揚雄韓愈以世次從祀於二十一賢之間並封伯爵哲宗皇帝元祐元年因四十六代孫朝議大夫試鴻臚卿宗翰奏請及臣僚上言儒廟闕典奉聖㫖令禮部太常寺同共詳定典禮下項一合襲封衍聖公者與除一有料錢寄禄官如已係幕職州縣官即與改合入官專以主奉先聖祠事為職添支供給隨本資序每三年理一任用本路及本州按察官薦舉依吏部格闗陞資任如朝廷非次擢用許依舊帶公爵令以次合襲封人權主祠事一添賜田一百頃使其家依鄉原例自召人户耕種更不得用職田制㩧之法一依舊法差灑埽户五十人看林戸五人並依役人法别差剰員毎一番十人充衍聖公白直一賜田所入供給祭祀外修立則例均贍族人置籍出納委本縣官一員與衍聖公并本家尊長通簽一賜監書一本置敎授官一員於舉到學官人内差或委本路監司保舉有行義人充令敎諭本家子弟内舉人依本州學正例優與供給如鄰近鄉人願從學者聽一衍聖公每遇親祀大禮及冬正朝會許赴闕陪位一改衍聖公為奉聖公及乞刪定家祭冕服等制度頒賜俾遵奉施行紹聖三年奉聖㫖下轉運司於係省錢内支錢三千貫修完本廟及於本路差雜役兵士工匠等運司奏委四十七代孫宣德郎襲封奉聖公若䝉監修元符元年奉聖㫖下本家衆議選擇近里守分人承襲據四十六代孫宗壽等保明四十七代孫前湖州歸安縣主簿若虛堪充襲封仍乞後來若虚身殁之後亦别行選擇不必子繼所貴留意祖廟敦睦族人奉聖㫖依奏改合入官襲封奉聖公專主奉祠事先是以襲封若䝉監修祖廟奪爵故有是命自選擇之法行族人皆務修齊間有登科預薦者鄉人以為朝廷激勸之效云太上皇帝崇寧元年追封孔氏二代三代勅孔鯉孔氏之道萬世所宗鯉實嗣之親聞詩禮魯堂從享厥有舊祠疏以爵封以示褒顯可特封泗水侯右追封二代勅勅孔伋聖人之道孟氏之師作為中庸萬世宗仰眷惟魯郡實有舊祠追加爵封以示褒典可特封沂水侯右追封三代勅二代三代初無祠堂元豐五年四十七代孫若升監修祖廟因輟已俸創建至是追封侯爵崇寧三年十一月十四日奉聖㫖至聖文宣王之後特與親屬一名判司簿尉令孔若虚具名聞奏今後事故以最長人承繼右劄付孔奉議崇寧三年十一月十三日崇寧三年據襲封保明四十六代孫宗哲係本家最長奉聖㫖特堂差興仁府乗氏縣主簿勅進士孔宗哲朕欽崇先聖廣其世恩爰俾若虚以名來上錫汝一命往其欽承崇寧三年十一月十六日勅司封供到文宣王之後襲封條貫下項一文宣王之後世以長子承襲封衍聖公未有官者除判司簿尉一文宣王之後常聽一人注兖州仙源縣官一元祐元年十月五日勅節文禮部太常寺奉朝議大夫試鴻臚卿孔宗翰奏今有本家之事上繫朝廷典禮須至開陳十二月三日三省同奉聖㫖依奏内白身合襲封奉聖公者除承奉郎改衍聖公為奉聖公及刪定家祭冕服等制度頒降俾遵奉施行一崇寧三年十一月四日奉聖㫖文宣王襲封人改封衍聖公今後襲封除承奉郎襲封衍聖公每遇元會大禮陪位班在太常少卿之下四十八代孫端友白身除承奉郎襲封衍聖公告勅至聖文宣王四十八代孫孔端友自書契以還爵于朝者多矣未有傳世四十有八而不絶者也惟爾文宣王之後序當承襲宜錫文階併示寵渥往加恪謹務保厥榮可大觀元年奉聖㫖下太常寺考正文宣王廟像冠服制度冕十二旒服九章五章在衣山龍華蟲火虎蜼四章在裳藻粉米黼黻厯朝以先聖與門人通用衮服至是始服王者之冕以周官并王荆公詩書禮義説為正大觀元年十二月初十日奉聖㫖不許採斫林木立賞錢十貫許人告捉政和元年奉聖㫖至聖文宣王改執鎮圭至聖文宣王廟舊立十六㦸今立二十四㦸又聖㫖至聖文宣王廟内曾參等所封侯爵與宣聖名同甚失弟子尊師之禮改封者八人政和元年奉聖㫖下轉運司於係省錢内應副修完本廟及於本路諸州軍差雜役兵士工匠和雇百姓修造運司奏委四十八代承奉郎襲封衍聖公端友監修政和四年四十七代孫文林郎舒州司户曹事若谷乞依辟廱大成殿頒降殿額二月初二日奉聖㫖依所乞其牌令後苑造御前生活所製造蔡京書冩竟不奉詔今已竄逐政和四年承奉郎襲封衍聖公孔端友乞依諸路頒降大晟新樂許内外族人及縣學生咸使肄習以備釋奠家祭使用二十七日奉聖㫖依所乞政和五年朝廷頒降少府監鑄到至聖文宣王廟祠朱記一顆以至聖文宣王廟朱記為章政和六年五月差四十七代孫宣教郎監和劑西局門若谷押賜大樂禮器付本廟宣和三年十一月奉聖㫖孔端友特轉通直郎除直祕閣仍許就任闗陞以示崇奬奉勅宣義郎襲封衍聖公管勾先聖廟孔端友宣聖古今師也由百世之後等百世之王殆未有能違之者朕既法其言尊其道舉以為治猶以為未也又録其後以褒大之爾先聖之系效官東魯積有年矣通籍金閨升華芸閣以示崇奬汝尚勉哉可宣和四年二月二十一日奉聖㫖孔若采係本家白身最長人與補迪功郎令吏部差充興仁府濟隂縣主簿替韓元頴年滿闕奉勅孔若采爾先聖之後恩禮宜優具載彞章肆頒命秩祗膺茂渥往謹官箴可宣和四年三月二日車駕幸太學賜御製至聖文宣王贊太學敎養多士嚴奉先聖殿室滋圯作而新之命駕奠謁系之以贊曰厥初生民自天有造百世之師立人之道有彝有倫垂世立敎爰集大成千古允蹈乃嚴斯所乃瞻斯宫瞻彼徳容云孰不宗車駕幸學奠謁畢特錄四十八世孫外舎生端朝賜上舎出身先是朝廷下太學供具至聖文宣王後在學人數是時獨端朝以外舎生在學駕幸學日上御敦化堂近侍進呈端朝姓名金口宣諭為是聖人子孫特賜上舎釋褐臚傳聖語搢紳驚歎以為天子尊師卹後超越古今先聖子孫榮遇如此高宗皇帝紹興二年勅送到吏部狀承都省批下本部徽州申據襲慶府免解進士孔瓚乞承繼判司簿尉事後批送吏部限兩日重别勘當申尚書省本部行下太常寺去後據本寺申會到本家尊長孔傳狀稱瓚係白身最長之人在外處别無白身最長合承繼恩澤之人本寺看詳孔瓚依得宗支及從來體例合承繼恩澤今取自朝廷指揮閏四月二十三日三省同奉聖㫖依太常寺所申孔瓚依例與補迪功郎令吏部與差判司簿尉紹興二年六月内準尚書省劄子勘當昨大觀年四十八代孫端友承襲準告特授承奉郎襲封衍聖公權發遣郴州到任因患身亡推次四十九代孫玠合行承襲䝉下本家尊長四十七代傳保明申尚書省本部尋行下太常寺去後據太常寺申看詳本家宗支圖子其襲封衍聖公孔端友止有庶子玠今來合係襲封衍聖公今來本寺所申伏乞朝廷詳酌施行閏四月三日三省同奉聖㫖依太常寺所申孔玠依例與補承奉郎襲封衍聖公奉勅至聖文宣王四十九代孫孔玠夫子之道踰於堯舜澤及萬世靡有所窮欽崇顧報邦有彛典肆予命爾紹于世封惟欽惟毖則無墜命可特授右承奉郎襲封衍聖公五月五日下嗣襲封爵沿改魏封魯國文信君秦封魯國文通君漢高祖封奉嗣君漢平帝元始元年改封褒成侯後漢明帝永平四年改封褒亭侯魏黄初元年改封崇聖侯晉武帝太始三年改封奉聖亭侯宋文帝元嘉三年改封崇聖侯後魏文帝延興三年封崇聖大夫後魏孝文帝太和九年改封崇聖侯北齊文帝天保元年改封恭聖侯後周宣帝大象二年封鄒國公隋大業四年封紹聖侯唐太宗貞觀十一年封褒聖侯唐𤣥宗開元二十七年封文宣公本朝仁宗皇帝改封衍聖公本朝哲宗皇帝元祐年改封奉聖公太上皇帝崇寧三年復改封衍聖公仁廟朝改衍聖公告孔子之後以爵號褒顯世世不絶者其來逺矣自漢元帝封其爵為褒成君以奉其子至平帝時改為褒成侯始進諡孔子為褒成宣尼公褒成其國也宣尼其諡也公侯其爵也後之子孫雖更改不一而不失其義至唐開元中始追諡孔子為文宣而尊以王爵封其嗣褒聖侯為嗣文宣公孔氏子孫去國名而襲諡號禮之失也蓋由此始朕稽考前訓博採羣議皆謂宜去漢之舊革唐之失稽古正名於義為允朕念先帝崇尚儒術親祠闕里而始加至聖之號務極尊顯之意肆朕纂臨繼奉先志尊崇聖道不敢失墜而正其後裔嗣襲之號不其重歟宜改封至聖文宣王四十六代孫宗愿為衍聖公右伯父衍聖公宗愿先以傳大父中憲廕補太廟齋郎文宣公聖祐蚤世嗣絶不復續朝廷推次伯父紹封時中憲備侍從進對之際仁宗皇帝問其名且曰可使知經術儒者傳以為榮鄉官唐開元五年始以三十五代璲為兖州長史自是鄉官相繼不絶逮本朝太祖皇帝雍熙年中自高祖襲封尚書仁玉嘗宰曲阜至淳化四年四十五代延世除曲阜縣令制曰叔敖陰徳尚繼絶於楚邦臧孫立言猶有後於魯國豈聖人之後可獨逺於陵廟乎許州長葛縣令孔延世鍾裔孫之慶仕文理之朝能敦素風甚有政術宜任桑梓之地以奉烝嘗之儀可特授曲阜縣令祥符二年眞宗皇帝東封禮畢躬詣儒廟思於孔氏擇人奉祀傳曾祖侍郎自牧方任殿中丞自廣倅乗驛赴闕召對移刻進表敘述家世際㑹之幸因授五品服知曲阜令止以本朝任鄉官者具列于後寶元元年四十四代孫自牧任祕書監主管陵廟自後本家最長人任鄉官者皆帶主管陵廟仁玉周廣順三年厯聖朝任兖州曲阜縣令襲文宣公宜雍熙三年任兖州曲阜縣令襲文宣公延世至道三年任兖州曲阜縣令襲文宣公原本避諱祥符二年以殿中丞知曲阜縣自牧祥符六年以屯田員外郎知曲阜縣道輔祥符九年以大理寺丞知曲阜縣又天聖二年以太常博士奉勅監修祖廟聖祐天聖二年以太子贊善大夫襲文宣公知仙源縣良輔天聖五年任兖州仙源縣主簿彦輔天聖八年任仙源縣主簿自牧景祐元年以太常少卿提舉仙源縣景靈宫太極觀道輔景祐二年以龍圖閣直學士右諫議大夫知兖州又景祐三年以龍圖閣直學士給事中起復知兖州自牧寳元元年以祕書監分司南京主管祖廟宗愿康定元年以國子監丞襲文宣公知仙源縣又慶厯三年以大理寺丞襲文宣公再任知仙源縣宗亮慶厯五年以將作監丞知仙源縣彦輔慶厯八年以衛尉寺丞知仙源縣宗翰嘉祐元年以祕書省著作佐郎知仙源縣淘嘉祐四年以屯田員外郎知仙源縣宗壽治平四年任兖州仙源縣主簿宗翰熙寧三年以尚書屯田郎中提㸃京東刑獄若䝉熙寧三年任兖州仙源縣主簿襲奉聖公宗翰熙寧十年以尚書都官郎中提㸃京東刑獄若升元豐元年任兖州仙源縣主簿又元豐五年奉勅以沂州新太縣令監修祖廟宗翰元祐元年以朝議大夫知兖州若古元祐四年任仙源縣主簿改名傳又元祐八年任仙源縣尉宗壽紹聖元年以右宣徳郎知仙源縣若谷大觀二年以文林郎行仙源縣丞傳政和五年以朝奉郎任京東路轉運司管勾文字宗哲大觀二年以從事郎任兖州觀察推官又政和三年以從事郎就差仙源縣丞端節宣和元年以宣敎郎特差京東路轉運司勾當公事壎宣和五年以通直郎任仙源縣丞端問靖康元年以迪功郎改差仙源縣丞東家雜記巻上
